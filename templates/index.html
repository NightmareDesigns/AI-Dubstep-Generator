<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nightmare AI Music Maker Dubstep Edition</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <header class="app-header">
      <h1>🎛️ Nightmare AI Music Maker Dubstep Edition</h1>
      <p class="subtitle">Powered by Markov-chain AI – generate authentic dubstep beats in seconds</p>
    </header>

    <!-- Controls panel -->
    <section class="controls-panel" aria-label="Generator Controls">
      <div class="control-group">
        <label for="bpm">BPM</label>
        <input type="range" id="bpm" min="80" max="180" value="140" step="1" />
        <span class="value-display" id="bpm-display">140</span>
      </div>

      <div class="control-group">
        <label for="key">Key</label>
        <select id="key">
          <option>C</option><option>C#</option><option>D</option>
          <option>D#</option><option>E</option><option>F</option>
          <option>F#</option><option>G</option><option>G#</option>
          <option>A</option><option>A#</option><option>B</option>
        </select>
      </div>

      <div class="control-group">
        <label for="scale">Scale</label>
        <select id="scale">
          <option value="minor">Minor</option>
          <option value="major">Major</option>
          <option value="phrygian">Phrygian</option>
          <option value="dorian">Dorian</option>
        </select>
      </div>

      <div class="control-group">
        <label for="style">Style</label>
        <select id="style">
          <option value="classic">Classic Dubstep</option>
          <option value="brostep">Brostep</option>
          <option value="future_bass">Future Bass</option>
        </select>
      </div>

      <div class="control-group">
        <label for="bars">Bars</label>
        <input type="range" id="bars" min="1" max="16" value="4" step="1" />
        <span class="value-display" id="bars-display">4</span>
      </div>
    </section>

    <!-- Dubstep Tools panel -->
    <section class="controls-panel dubstep-tools" aria-label="Dubstep Tools">
      <h2 class="panel-title">🔊 Dubstep Tools</h2>

      <div class="control-group">
        <label for="wobble-rate">Wobble Rate (Hz)</label>
        <select id="wobble-rate">
          <option value="auto">Auto (style-based)</option>
          <option value="1">1 Hz</option>
          <option value="2">2 Hz</option>
          <option value="4">4 Hz</option>
          <option value="8">8 Hz</option>
          <option value="16">16 Hz</option>
        </select>
      </div>

      <div class="control-group">
        <label for="wobble-depth">Wobble Depth</label>
        <input type="range" id="wobble-depth" min="0" max="100" value="70" step="5" />
        <span class="value-display" id="wobble-depth-display">70%</span>
      </div>

      <div class="control-group">
        <label for="resonance">Resonance</label>
        <input type="range" id="resonance" min="0" max="100" value="70" step="5" />
        <span class="value-display" id="resonance-display">70%</span>
      </div>

      <div class="control-group">
        <label for="wobble-shape">Wobble Shape</label>
        <select id="wobble-shape">
          <option value="auto">Auto (random)</option>
          <option value="sine">Sine</option>
          <option value="square">Square</option>
          <option value="sawtooth">Sawtooth</option>
          <option value="triangle">Triangle</option>
        </select>
      </div>

      <div class="control-group">
        <label for="cutoff-min">Cutoff Min (Hz)</label>
        <input type="range" id="cutoff-min" min="50" max="800" value="200" step="10" />
        <span class="value-display" id="cutoff-min-display">200</span>
      </div>

      <div class="control-group">
        <label for="cutoff-max">Cutoff Max (Hz)</label>
        <input type="range" id="cutoff-max" min="800" max="8000" value="3000" step="100" />
        <span class="value-display" id="cutoff-max-display">3000</span>
      </div>
    </section>

    <!-- Action buttons -->
    <section class="action-buttons">
      <button id="btn-generate" class="btn btn-primary">🎲 Generate Pattern</button>
      <button id="btn-play"     class="btn btn-secondary" disabled>▶ Play</button>
      <button id="btn-stop"     class="btn btn-secondary" disabled>■ Stop</button>
      <button id="btn-download" class="btn btn-secondary" disabled>⬇ Download WAV</button>
    </section>

    <!-- Status bar -->
    <div id="status-bar" class="status-bar" aria-live="polite">
      Press <strong>Generate Pattern</strong> to start.
    </div>

    <!-- Pattern visualizer -->
    <section class="visualizer-section">
      <h2>Pattern Grid</h2>
      <div id="pattern-grid" class="pattern-grid" aria-label="Drum Pattern Grid">
        <p class="placeholder-text">No pattern generated yet.</p>
      </div>
    </section>

    <!-- Waveform visualizer -->
    <section class="visualizer-section">
      <h2>Waveform</h2>
      <canvas id="waveform-canvas" width="900" height="120" aria-label="Waveform"></canvas>
    </section>

    <!-- Pattern details accordion -->
    <section class="details-section">
      <details>
        <summary>Pattern Data (JSON)</summary>
        <pre id="pattern-json" class="json-output">—</pre>
      </details>
    </section>

  </div><!-- .app-container -->

  <script src="/static/js/app.js"></script>
</body>
</html>
